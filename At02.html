<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT02 — Cadastro de Usuário</title>
</head>
<body>

<header>
  <h1>AT02 — Cadastro de Usuário</h1>
  <p><a href="index.html">← Voltar para a página principal</a></p>
</header>

<main>
  <form action="https://httpbin.org/post" method="post">
    <label for="nome">Nome completo: <span aria-hidden="true">*</span></label>
    <input type="text" id="nome" name="nome" required minlength="3">

    <label for="email">E-mail: <span aria-hidden="true">*</span></label>
    <input type="email" id="email" name="email" required>

    <label for="senha">Senha: <span aria-hidden="true">*</span></label>
    <input type="password" id="senha" name="senha" required minlength="8">

    <label for="nascimento">Data de nascimento: <span aria-hidden="true">*</span></label>
    <input type="date" id="nascimento" name="nascimento" required>

    <fieldset>
      <legend>Gênero</legend>
      <label><input type="radio" name="genero" value="masculino"> Masculino</label>
      <label><input type="radio" name="genero" value="feminino"> Feminino</label>
      <label><input type="radio" name="genero" value="outro"> Outro</label>
      <label><input type="radio" name="genero" value="prefiro_nao_informar"> Prefiro não informar</label>
    </fieldset>

    <label><input type="checkbox" name="aceite" value="sim" required> Aceito os termos de uso</label>

    <button type="submit">Criar conta</button>
    <button type="reset">Limpar campos</button>
  </form>
</main>

</body>
</html>
