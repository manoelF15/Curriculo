<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>

<header>
  <h1>AT03 — Matrícula Acadêmica</h1>
  <p><a href="index.html">← Voltar para a página principal</a></p>
</header>

<main>
  <p>* Campos obrigatórios</p>
  <form action="https://httpbin.org/post" method="post">

    <!-- Dados Pessoais -->
    <fieldset>
      <legend>Dados Pessoais</legend>
      <label for="nome">Nome completo: *</label>
      <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">

      <label for="cpf">CPF: *</label>
      <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00">

      <label for="telefone">Telefone:</label>
      <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999">

      <label for="email">E-mail: *</label>
      <input type="email" id="email" name="email" required>
    </fieldset>

    <!-- Dados Acadêmicos -->
    <fieldset>
      <legend>Dados Acadêmicos</legend>

      <label for="curso">Curso: *</label>
      <select name="curso" id="curso" required>
        <option value="">Selecione...</option>
        <optgroup label="Computação">
          <option value="sistemas">Sistemas de Informação</option>
          <option value="cc">Ciência da Computação</option>
          <option value="engcomp">Engenharia da Computação</option>
        </optgroup>
        <optgroup label="Gestão">
          <option value="adm">Administração</option>
          <option value="contabeis">Ciências Contábeis</option>
        </optgroup>
      </select>

      <fieldset>
        <legend>Período</legend>
        <label><input type="radio" name="periodo" value="manha"> Manhã</label>
        <label><input type="radio" name="periodo" value="tarde"> Tarde</label>
        <label><input type="radio" name="periodo" value="noite"> Noite</label>
      </fieldset>

      <label for="ano_ingresso">Ano de ingresso: *</label>
      <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required>
    </fieldset>

    <!-- Áreas de Interesse -->
    <fieldset>
      <legend>Áreas de Interesse</legend>
      <label><input type="checkbox" name="interesses[]" value="desenvolvimento_web"> Desenvolvimento Web</label>
      <label><input type="checkbox" name="interesses[]" value="banco_dados"> Banco de Dados</label>
      <label><input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial</label>
      <label><input type="checkbox" name="interesses[]" value="seguranca_info"> Segurança da Informação</label>
      <label><input type="checkbox" name="interesses[]" value="infraestrutura"> Infraestrutura</label>
    </fieldset>

    <button type="submit">Solicitar matrícula</button>
    <button type="reset">Limpar formulário</button>
  </form>
</main>

</body>
</html>
