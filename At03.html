<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>

<header>
  <h1>AT03 — Matrícula Acadêmica</h1>
</header>

<main>

  <p>* Campos obrigatórios</p>

  <form action="https://httpbin.org/post" method="post">

    <fieldset>
      <legend>Dados Pessoais</legend>

      <label>Nome completo: *</label>
      <input type="text" name="nome" required minlength="5" maxlength="100">

      <label>CPF: *</label>
      <input type="text" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00">

      <label>Telefone:</label>
      <input type="tel" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999">

      <label>E-mail: *</label>
      <input type="email" name="email" required>

    </fieldset>

    <fieldset>
      <legend>Dados Acadêmicos</legend>

      <select name="curso" required>
        <option value="">Selecione</option>
        <optgroup label="Computação">
          <option>Sistemas de Informação</option>
          <option>Ciência da Computação</option>
          <option>Engenharia da Computação</option>
        </optgroup>
        <optgroup label="Gestão">
          <option>Administração</option>
          <option>Ciências Contábeis</option>
        </optgroup>
      </select>

      <fieldset>
        <legend>Período</legend>
        <label><input type="radio" name="periodo" value="manha"> Manhã</label>
        <label><input type="radio" name="periodo" value="tarde"> Tarde</label>
        <label><input type="radio" name="periodo" value="noite"> Noite</label>
      </fieldset>

      <label>Ano de ingresso:</label>
      <input type="number" name="ano_ingresso" min="2025" max="2030" required>

    </fieldset>

    <fieldset>
      <legend>Áreas de Interesse</legend>

      <label><input type="checkbox" name="interesses[]" value="web"> Web</label>
      <label><input type="checkbox" name="interesses[]" value="bd"> Banco de Dados</label>
      <label><input type="checkbox" name="interesses[]" value="ia"> IA</label>
      <label><input type="checkbox" name="interesses[]" value="seg"> Segurança</label>
      <label><input type="checkbox" name="interesses[]" value="infra"> Infraestrutura</label>

    </fieldset>

    <button type="submit">Solicitar matrícula</button>
    <button type="reset">Limpar formulário</button>

  </form>

</main>
<p></p><a href="index.html">← Voltar à página principal</a></p
</body>
</html>
