<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>

<header>
  <h1>AT04 — Inscrição em Evento</h1>
  <p><a href="index.html">← Voltar para a página principal</a></p>
</header>

<main>
  <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">
    
    <p>* Campos obrigatórios</p>

    <!-- Identificação do participante -->
    <fieldset>
      <legend>Identificação do participante</legend>

      <label for="nome">Nome completo: *</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">E-mail institucional: *</label>
      <input type="email" id="email" name="email" required>

      <label for="cidade">Cidade de origem:</label>
      <input list="cidades" id="cidade" name="cidade">
      <datalist id="cidades">
        <option value="Maceió">
        <option value="Arapiraca">
        <option value="Palmeira dos Índios">
        <option value="Rio Largo">
        <option value="Penedo">
        <option value="Maragogi">
        <option value="São Miguel dos Campos">
        <option value="Coruripe">
      </datalist>

      <label for="foto">Foto para crachá:</label>
      <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="info-foto">
      <small id="info-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
    </fieldset>

    <!-- Preferências para o evento -->
    <fieldset>
      <legend>Preferências para o evento</legend>

      <label for="chegada">Data e hora preferida para chegada:</label>
      <input type="datetime-local" id="chegada" name="chegada">

      <label for="experiencia">Nível de experiência: <span id="valor-experiencia">5</span>/10</label>
      <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5"
             oninput="document.getElementById('valor-experiencia').textContent = this.value">

      <label for="cor_camiseta">Cor de preferência para a camiseta:</label>
      <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8">

      <label for="oficinas">Oficinas de interesse:</label>
      <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="info-oficinas">
        <option value="web">Desenvolvimento Web</option>
        <option value="bd">Banco de Dados</option>
        <option value="ia">Inteligência Artificial</option>
        <option value="seg">Segurança da Informação</option>
        <option value="infra">Infraestrutura</option>
      </select>
      <small id="info-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>

      <input type="hidden" name="edicao" value="2026">
    </fieldset>

    <button type="submit">Confirmar inscrição</button>
  </form>
</main>

</body>
</html>
