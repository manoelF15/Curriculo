<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>

<header>
  <h1>AT04 — Inscrição em Evento</h1>
</header>

<main>

  <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

    <fieldset>
      <legend>Identificação</legend>

      <label>Nome:</label>
      <input type="text" name="nome" required>

      <label>E-mail:</label>
      <input type="email" name="email" required>

      <label>Cidade:</label>
      <input list="cidades" name="cidade">

      <datalist id="cidades">
        <option>Maceió</option>
        <option>Arapiraca</option>
        <option>Palmeira dos Índios</option>
        <option>Rio Largo</option>
        <option>Penedo</option>
        <option>Maragogi</option>
        <option>São Miguel dos Campos</option>
        <option>Coruripe</option>
      </datalist>

      <label>Foto:</label>
      <input type="file" name="foto" accept="image/jpeg,image/png">

      <small>Formatos JPG e PNG</small>

    </fieldset>

    <fieldset>
      <legend>Preferências</legend>

      <label>Chegada:</label>
      <input type="datetime-local" name="chegada">

      <label>Experiência:</label>
      <input type="range" name="experiencia" min="0" max="10" value="5">

      <label>Cor:</label>
      <input type="color" name="cor_camiseta" value="#1a73e8">

      <label>Oficinas:</label>
      <select name="oficinas[]" multiple size="4">
        <option>Web</option>
        <option>BD</option>
        <option>IA</option>
        <option>Segurança</option>
        <option>Infraestrutura</option>
      </select>

      <input type="hidden" name="edicao" value="2026">

    </fieldset>

    <button type="submit">Confirmar inscrição</button>

  </form>

</main>
<p></p><a href="index.html">← Voltar à página principal</a></p>
</body>
</html>
