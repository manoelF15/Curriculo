      <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT05 — Pesquisa Acadêmica</title>
</head>
<body>

<header>
  <h1>AT05 — Pesquisa Acadêmica</h1>
</header>

<main>

  <p>* Campos obrigatórios</p>

  <form action="https://httpbin.org/post" method="post" novalidate>

    <fieldset>
      <legend>Perfil do estudante</legend>

      <label for="nome">Nome completo: *</label>
      <input type="text" id="nome" name="nome" required autocomplete="name">

      <label for="matricula">Matrícula: *</label>
      <input type="text" id="matricula" name="matricula" required pattern="\d{7}">

      <label for="email">E-mail institucional: *</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
        aria-required="true"
        aria-invalid="false"
        aria-describedby="erro-email"
        onblur="validarEmail(this)"
      >
      <p id="erro-email" role="alert"></p>

      <label for="periodo">Período:</label>
      <select id="periodo" name="periodo">
        <option value="1">1º</option>
        <option value="2">2º</option>
        <option value="3">3º</option>
        <option value="4">4º</option>
        <option value="5">5º</option>
        <option value="6">6º</option>
        <option value="7">7º</option>
        <option value="8">8º</option>
      </select>

      <fieldset>
        <legend>Turno</legend>
        <label><input type="radio" name="turno" value="manha"> Manhã</label>
        <label><input type="radio" name="turno" value="tarde"> Tarde</label>
        <label><input type="radio" name="turno" value="noite"> Noite</label>
      </fieldset>

    </fieldset>

    <fieldset>
      <legend>Perfil tecnológico</legend>

      <label>Tecnologias que conhece:</label>
      <label><input type="checkbox" name="tecnologias[]" value="html"> HTML</label>
      <label><input type="checkbox" name="tecnologias[]" value="css"> CSS</label>
      <label><input type="checkbox" name="tecnologias[]" value="js"> JavaScript</label>
      <label><input type="checkbox" name="tecnologias[]" value="python"> Python</label>
      <label><input type="checkbox" name="tecnologias[]" value="java"> Java</label>
      <label><input type="checkbox" name="tecnologias[]" value="sql"> SQL</label>
      <label><input type="checkbox" name="tecnologias[]" value="git"> Git</label>
      <label><input type="checkbox" name="tecnologias[]" value="linux"> Linux</label>

      <label for="linguagem">Linguagem favorita:</label>
      <select id="linguagem" name="linguagem">
        <optgroup label="Imperativo">
          <option value="c">C</option>
          <option value="java">Java</option>
        </optgroup>
        <optgroup label="Moderno">
          <option value="js">JavaScript</option>
          <option value="python">Python</option>
        </optgroup>
      </select>

      <label for="anos">Anos de experiência:</label>
      <input type="number" id="anos" name="anos" min="0" max="30">

      <label for="portfolio">Portfólio / LinkedIn:</label>
      <input type="url" id="portfolio" name="portfolio" placeholder="https://">
    </fieldset>

    <fieldset>
      <legend>Avaliação da disciplina</legend>

      <label for="nota">Nota da disciplina:</label>
      <input
        type="range"
        id="nota"
        name="nota"
        min="0"
        max="10"
        value="5"
        oninput="document.getElementById('valor-nota').textContent = this.value"
      >
      <span id="valor-nota">5</span>/10

      <fieldset>
        <legend>Satisfação com o material</legend>
        <label><input type="radio" name="satisfacao" value="muito_satisfeito"> Muito satisfeito</label>
        <label><input type="radio" name="satisfacao" value="satisfeito"> Satisfeito</label>
        <label><input type="radio" name="satisfacao" value="neutro"> Neutro</label>
        <label><input type="radio" name="satisfacao" value="insatisfeito"> Insatisfeito</label>
        <label><input type="radio" name="satisfacao" value="muito_insatisfeito"> Muito insatisfeito</label>
      </fieldset>

      <label for="sugestoes">Sugestões de melhoria:</label>
      <textarea id="sugestoes" name="sugestoes" rows="6" maxlength="1000"></textarea>

      <label for="data">Data de preenchimento:</label>
      <input type="date" id="data" name="data" required>

    </fieldset>

    <fieldset>
      <legend>Consentimento e envio</legend>

      <label>
        <input type="checkbox" name="consentimento" required>
        Autorizo o uso dos dados para fins acadêmicos
      </label>

      <input type="hidden" name="pesquisa_id" value="PWEB1-2026-1">
    </fieldset>

    <button type="submit">Enviar</button>

  </form>

</main>

<script>
  function validarEmail(campo) {
    const erro = document.getElementById('erro-email');

    if (!campo.value.endsWith('@ifal.edu.br')) {
      erro.textContent = 'Informe seu e-mail institucional (@ifal.edu.br)';
      campo.setAttribute('aria-invalid', 'true');
    } else {
      erro.textContent = '';
      campo.setAttribute('aria-invalid', 'false');
    }
  }

  document.getElementById('data').max =
    new Date().toISOString().split('T')[0];
</script>

<p><a href="index.html">← Voltar à página principal</a></p>
</body>
</html>
