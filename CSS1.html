<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Atividade CSS 01</title>
  <link rel="stylesheet" href="CSS1.css">
</head>
<body>

<header class="cabecalho">
  <h1>Cadastro de Cliente</h1>
  <p>Atividade de CSS - Formulário simples</p>
</header>

<main>

  <form class="formulario">

    <div class="campo">
      <label>Nome</label>
      <input type="text">
    </div>

    <div class="campo">
      <label>E-mail</label>
      <input type="email">
    </div>

    <div class="campo">
      <label>Senha</label>
      <input type="password">
    </div>

    <div class="campo">
      <label>Data de Nascimento</label>
      <input type="date">
    </div>

    <div class="campo">
      <label>Curso</label>
      <select>
        <option>Informática</option>
        <option>Química</option>
        <option>Agropecuária</option>
      </select>
    </div>

    <div class="campo">
      <label>Comentário</label>
      <textarea></textarea>
    </div>

    <div class="campo">
      <label><input type="checkbox"> Aceito os termos</label>
    </div>

    <div class="campo">
      <p>Turno</p>
      <label><input type="radio" name="turno"> Manhã</label>
      <label><input type="radio" name="turno"> Tarde</label>
    </div>

    <button class="botao" type="submit">Enviar</button>
    <a href="index.html" class="botao">Voltar</a>


  </form>

</main>

<footer class="rodape">
  <p>Seu Nome</p>
  <p>Data: 25/06/2026</p>
  <p>Disciplina: CSS</p>
</footer>

</body>
</html>
